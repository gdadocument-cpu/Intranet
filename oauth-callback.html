<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion Discord GDA</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #12385d, #061523 68%);
      color: #eef7ff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    main {
      width: min(440px, 100%);
      padding: 32px;
      border: 1px solid rgba(150, 207, 255, .25);
      border-radius: 18px;
      background: rgba(5, 22, 38, .88);
      box-shadow: 0 22px 70px rgba(0, 0, 0, .35);
    }
    h1 { margin-top: 0; color: #8fd0ff; }
    p { margin-bottom: 0; line-height: 1.55; }
    .succes { color: #59e391; }
    .erreur { color: #ff7777; }
  </style>
</head>
<body>
  <main>
    <h1 id="titre">Verification Discord...</h1>
    <p id="message">La connexion est en cours de validation.</p>
  </main>
  <script>
    (async function () {
      "use strict";

      const API_URL =
        "https://script.google.com/macros/s/AKfycbxl-j8XfEC6d_LmaspiD3VZSGqqHrgdM2pm36iU0F_t5dtcubjtg3Xo4i7WWKCN34Dl/exec";
      const titre = document.getElementById("titre");
      const message = document.getElementById("message");
      const recus = new URLSearchParams(window.location.search);
      const transmis = new URLSearchParams({ action: "finaliserConnexionDiscord" });

      ["code", "state", "error", "error_description"].forEach(function (nom) {
        const valeur = recus.get(nom);
        if (valeur) transmis.set(nom, valeur);
      });

      function terminer(resultat) {
        const succes = resultat && resultat.success === true;
        titre.textContent = succes ? "Connexion validee" : "Connexion refusee";
        titre.className = succes ? "succes" : "erreur";
        message.textContent = succes
          ? "Identite Discord verifiee. Cette fenetre va se fermer."
          : (resultat && resultat.message) || "La connexion Discord a echoue.";

        if (window.opener) {
          window.opener.postMessage({ type: "GDA_DISCORD_AUTH_READY" }, window.location.origin);
        }
        setTimeout(function () { window.close(); }, 3000);
      }

      if (!recus.get("state") || (!recus.get("code") && !recus.get("error"))) {
        terminer({ success: false, message: "Parametres Discord manquants." });
        return;
      }

      try {
        const reponse = await fetch(API_URL + "?" + transmis.toString());
        terminer(await reponse.json());
      } catch (erreur) {
        terminer({
          success: false,
          message: "Impossible de joindre le serveur GDA. Recommencez la connexion."
        });
      }
    })();
  </script>
</body>
</html>
